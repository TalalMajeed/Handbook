<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handbook QA — NUST SEECS</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>

    <!-- Top bar -->
    <div class="topbar-wrap">
        <header class="topbar">
            <div style="display:flex;align-items:center;gap:12px;">
                <div id="statusDot" class="status-dot status-ready" title="Ready"></div>
                <span class="topbar-title">Handbook QA</span>
                <span class="topbar-sub">NUST SEECS</span>
            </div>
            <button id="clearBtn" class="clear-btn" type="button">Clear</button>
        </header>
    </div>

    <!-- Two-column layout -->
    <div class="layout">

        <!-- Left: Chat -->
        <main class="chat-panel">
            <div id="chatLog" class="chat-log" aria-live="polite"></div>
            <form id="chatForm" class="composer">
                <textarea id="promptInput" rows="1" placeholder="Ask anything about the handbook…" autocomplete="off"></textarea>
                <button id="sendBtn" class="send-btn" type="submit" title="Send">
                    <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" width="18" height="18">
                        <path d="M14 8L2 2l3 6-3 6 12-6z" fill="currentColor"/>
                    </svg>
                </button>
            </form>
        </main>

        <!-- Right: Evidence panel -->
        <aside class="evidence-panel">
            <div class="evidence-header">
                <span>Retrieved Evidence</span>
                <span id="evidenceMethod" class="method-badge"></span>
            </div>
            <div id="evidenceList" class="evidence-list">
                <p class="evidence-placeholder">Retrieved chunks will appear here after you ask a question.</p>
            </div>
        </aside>

    </div>

    <!-- Chunk detail modal -->
    <div id="chunkModal" class="modal-backdrop" role="dialog" aria-modal="true" aria-label="Chunk detail">
        <div class="modal-box">
            <div class="modal-header">
                <div id="modalMeta" class="modal-meta"></div>
                <button id="modalClose" class="modal-close" title="Close">✕</button>
            </div>
            <div id="modalBody" class="modal-body"></div>
        </div>
    </div>

    <script src="/static/logic.js"></script>
</body>
</html>
